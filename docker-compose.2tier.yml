# App-only services (infra runs on separate server)
# Usage: docker compose -f docker-compose.2tier.yml up -d

services:
  tenant-service:
    build:
      context: .
      dockerfile: services/tenant-service/Dockerfile
    container_name: whatsapp-tenant-service
    restart: unless-stopped
    ports:
      - "3007:3007"
    env_file:
      - .env
    environment:
      PORT: 3007
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3007/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: whatsapp-auth-service
    restart: unless-stopped
    ports:
      - "3004:3004"
    env_file:
      - .env
    environment:
      PORT: 3004
      TENANT_SERVICE_URL: http://tenant-service:3007
    depends_on:
      - tenant-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  state-manager:
    build:
      context: .
      dockerfile: services/state-manager/Dockerfile
    container_name: whatsapp-state-manager
    restart: unless-stopped
    ports:
      - "3005:3005"
    env_file:
      - .env
    environment:
      PORT: 3005
    depends_on:
      - tenant-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  whatsapp-webhook-service:
    build:
      context: .
      dockerfile: services/whatsapp-webhook-service/Dockerfile
    container_name: whatsapp-webhook
    restart: unless-stopped
    ports:
      - "3009:3009"
    env_file:
      - .env
    environment:
      PORT: 3009
      TENANT_SERVICE_URL: http://tenant-service:3007
    depends_on:
      - tenant-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3009/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  whatsapp-api-service:
    build:
      context: .
      dockerfile: services/whatsapp-api-service/Dockerfile
    container_name: whatsapp-api
    restart: unless-stopped
    ports:
      - "3008:3008"
    env_file:
      - .env
    environment:
      PORT: 3008
      TENANT_SERVICE_URL: http://tenant-service:3007
    depends_on:
      - tenant-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3008/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  genesys-webhook-service:
    build:
      context: .
      dockerfile: services/genesys-webhook-service/Dockerfile
    container_name: genesys-webhook
    restart: unless-stopped
    ports:
      - "3011:3011"
    env_file:
      - .env
    environment:
      PORT: 3011
      TENANT_SERVICE_URL: http://tenant-service:3007
      AUTH_SERVICE_URL: http://auth-service:3004
    depends_on:
      - tenant-service
      - auth-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3011/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  genesys-api-service:
    build:
      context: .
      dockerfile: services/genesys-api-service/Dockerfile
    container_name: genesys-api
    restart: unless-stopped
    ports:
      - "3010:3010"
    env_file:
      - .env
    environment:
      PORT: 3010
      TENANT_SERVICE_URL: http://tenant-service:3007
      AUTH_SERVICE_URL: http://auth-service:3004
      STATE_SERVICE_URL: http://state-manager:3005
    depends_on:
      - tenant-service
      - auth-service
      - state-manager
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3010/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  inbound-transformer:
    build:
      context: .
      dockerfile: services/inbound-transformer/Dockerfile
    container_name: whatsapp-inbound-transformer
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file:
      - .env
    environment:
      PORT: 3002
      STATE_SERVICE_URL: http://state-manager:3005
      GENESYS_API_URL: http://genesys-api:3010
    depends_on:
      - state-manager
      - genesys-api-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  outbound-transformer:
    build:
      context: .
      dockerfile: services/outbound-transformer/Dockerfile
    container_name: whatsapp-outbound-transformer
    restart: unless-stopped
    ports:
      - "3003:3003"
    env_file:
      - .env
    environment:
      PORT: 3003
      STATE_SERVICE_URL: http://state-manager:3005
      TENANT_SERVICE_URL: http://tenant-service:3007
      WHATSAPP_API_URL: http://whatsapp-api:3008
    depends_on:
      - state-manager
      - whatsapp-api-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: whatsapp-api-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      PORT: 3000
      WHATSAPP_WEBHOOK_URL: http://whatsapp-webhook:3009
      WHATSAPP_API_URL: http://whatsapp-api:3008
      GENESYS_WEBHOOK_URL: http://genesys-webhook:3011
      GENESYS_API_URL: http://genesys-api:3010
      TENANT_SERVICE_URL: http://tenant-service:3007
      AUTH_SERVICE_URL: http://auth-service:3004
      STATE_SERVICE_URL: http://state-manager:3005
      AGENT_PORTAL_SERVICE_URL: http://agent-portal-service:3015
      AGENT_WIDGET_URL: http://agent-widget:3012
    depends_on:
      - tenant-service
      - auth-service
      - state-manager
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  agent-portal-service:
    build:
      context: .
      dockerfile: services/agent-portal-service/Dockerfile
    container_name: whatsapp-agent-portal-service
    restart: unless-stopped
    ports:
      - "3015:3015"
    env_file:
      - .env
    environment:
      PORT: 3015
      TENANT_SERVICE_URL: http://tenant-service:3007
      AUTH_SERVICE_URL: http://auth-service:3004
      STATE_MANAGER_URL: http://state-manager:3005
      WHATSAPP_API_URL: http://whatsapp-api:3008
      AGENT_WIDGET_URL: http://agent-widget:3012
      GENESYS_REDIRECT_URI: http://65.2.112.193:3000/api/agents/auth/callback
      AGENT_PORTAL_FRONTEND_URL: http://65.2.112.193:3014
      ALLOWED_ORIGINS: http://65.2.112.193:3014,http://65.2.112.193:3000
    depends_on:
      - tenant-service
      - auth-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3015/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  agent-portal:
    build:
      context: .
      dockerfile: services/agent-portal/Dockerfile
      args:
        - VITE_API_GATEWAY=http://65.2.112.193:3000
        - VITE_AGENT_WIDGET_URL=ws://65.2.112.193:3012
        - VITE_ENABLE_DEV_LOGIN=true
    container_name: whatsapp-agent-portal
    restart: unless-stopped
    ports:
      - "3014:80"
    env_file:
      - .env
    environment:
      PORT: 3014
      VITE_API_GATEWAY: http://65.2.112.193:3000
      VITE_AGENT_WIDGET_URL: ws://65.2.112.193:3012
      VITE_ENABLE_DEV_LOGIN: "true"
    depends_on:
      - api-gateway
      - agent-portal-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  agent-widget:
    build:
      context: .
      dockerfile: services/agent-widget/Dockerfile
    container_name: whatsapp-agent-widget
    restart: unless-stopped
    ports:
      - "3012:3012"
    env_file:
      - .env
    environment:
      PORT: 3012
      STATE_SERVICE_URL: http://state-manager:3005
      WHATSAPP_API_URL: http://whatsapp-api:3008
      AGENT_PORTAL_SERVICE_URL: http://agent-portal-service:3015
    depends_on:
      - state-manager
      - whatsapp-api-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3012/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  admin-dashboard:
    build:
      context: .
      dockerfile: services/admin-dashboard/Dockerfile
      args:
        - VITE_API_GATEWAY=http://65.2.112.193:3000
    container_name: whatsapp-admin-dashboard
    restart: unless-stopped
    ports:
      - "3006:80"
    env_file:
      - .env
    environment:
      VITE_API_GATEWAY: http://65.2.192.193:3000
    depends_on:
      - api-gateway
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    name: waba-network
